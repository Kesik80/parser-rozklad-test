<!DOCTYPE html>
<html lang="uk" style="background:#000000">
<head>
<meta charset="utf-8">
<title>Парсер розкладу</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta id="themeColorMeta" name="theme-color" content="#000000">
<meta name="theme-color" content="#000000">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Парсер">

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<link rel="icon" href="/icons/favicon.ico" sizes="32x32">

<style>
:root {
  --bg-0: #000000; --bg-1: #1c1c1e; --bg-2: #2c2c2e;
  --label: #ffffff; --label-2: #a2a2a7;
  --accent: #0a84ff; --green: #30d158; --warn: #ff9f0a; --red: #ff453a;
  --separator: #3a3a3c;
  --font: -apple-system, Roboto, "Segoe UI", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; font-family:var(--font); }
html { background:#000000; }
body { background:var(--bg-0); color:var(--label); min-height:100vh; padding:12px; padding-top: calc(12px + env(safe-area-inset-top)); padding-bottom: calc(40px + env(safe-area-inset-bottom)); max-width:720px; margin:0 auto; }

h1 { font-size:20px; font-weight:700; text-align:center; padding:12px 0 4px; }
.sub { font-size:13px; color:var(--label-2); text-align:center; margin-bottom:16px; }

.card { background:var(--bg-1); border-radius:12px; padding:14px; margin-bottom:12px; }
.card-title { font-size:13px; font-weight:700; color:var(--label-2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }

label { display:block; font-size:14px; color:var(--label-2); margin-bottom:4px; margin-top:10px; }
label:first-of-type { margin-top:0; }
input, textarea, select {
  width:100%; background:var(--bg-2); border:1px solid var(--separator);
  border-radius:8px; padding:8px 10px; font-size:14px; color:var(--label); outline:none;
}
input:focus, textarea:focus { border-color:var(--accent); }
textarea { height:72px; resize:vertical; font-size:13px; }
select option { background:var(--bg-1); }

.stations-list { display:flex; flex-direction:column; gap:6px; margin-top:6px; }
.station-row { display:flex; gap:6px; align-items:center; }
.station-row input { flex:1; }
.btn-icon { background:var(--bg-2); border:1px solid var(--separator); border-radius:6px; padding:6px 10px; color:var(--label-2); cursor:pointer; font-size:16px; flex-shrink:0; }
.btn-icon:hover { background:var(--separator); }

.btn { display:block; width:100%; padding:12px; border-radius:10px; border:none; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:disabled { opacity:.4; cursor:default; }
.btn-retry { background:var(--warn); color:#000; }

.status { font-size:13px; padding:8px 10px; border-radius:8px; margin-top:8px; display:none; }
.status.info  { background:rgba(10,132,255,.15); color:var(--accent); display:block; }
.status.ok    { background:rgba(48,209,88,.15);  color:var(--green);  display:block; }
.status.error { background:rgba(255,69,58,.15);  color:var(--red);    display:block; }

.progress-bar { height:4px; background:var(--bg-2); border-radius:2px; margin-top:8px; overflow:hidden; display:none; }
.progress-bar.show { display:block; }
.progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .3s; }

.result-block { margin-top:12px; }
.result-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; flex-wrap:wrap; gap:6px; }
.result-title { font-size:14px; font-weight:700; color:var(--warn); }
.copy-btn { background:var(--bg-2); border:1px solid var(--separator); border-radius:6px; padding:5px 12px; font-size:13px; color:var(--accent); cursor:pointer; white-space:nowrap; }

.trains-grid { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th { background:var(--bg-2); color:var(--warn); padding:6px 5px; text-align:center; border-bottom:1px solid var(--separator); white-space:nowrap; }
th.s { text-align:left; }
td { padding:4px 5px; text-align:center; color:var(--label-2); border-bottom:1px solid var(--separator); white-space:nowrap; }
td.s { text-align:left; color:var(--label); font-weight:600; }
td.miss { color:var(--separator); }
tr:last-child td { border-bottom:none; }

pre { background:var(--bg-2); border-radius:8px; padding:10px; font-size:11px; color:var(--green);
  overflow-x:auto; white-space:pre-wrap; word-break:break-all; max-height:220px;
  overflow-y:auto; margin-top:8px; }

.direction-badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:10px; font-weight:700; margin-left:6px; }
.dir-odd  { background:rgba(10,132,255,.2); color:var(--accent); }
.dir-even { background:rgba(48,209,88,.2);  color:var(--green); }

#tidsStatus { font-size:12px; color:var(--label-2); margin-top:4px; display:none; }
</style>
</head>
<body>

<h1>🚂 Парсер розкладу</h1>
<p class="sub">swrailway.gov.ua → elektrychky.html</p>

<div class="card">
  <div class="card-title">Налаштування</div>

  <label>Маршрут</label>
  <select id="searchStation" onchange="onSearchStationChange()">
    <option value="both">Обидва маршрути (Терешки + Копили)</option>
    <option value="tereschky">Тільки Терешки</option>
    <option value="kopily">Тільки Копили</option>
  </select>

  <label>TID поїздів</label>
  <button class="btn-icon" style="width:100%;margin-bottom:6px;font-size:13px" onclick="autoLoadTids()">🔄 Завантажити автоматично</button>
  <textarea id="tids" placeholder="28320, 28379, 28343..."></textarea>
  <div id="tidsStatus"></div>

  <label style="display:flex;align-items:center;gap:6px;margin-top:10px;cursor:pointer;">
    <input type="checkbox" id="forceRefresh" style="width:auto;accent-color:var(--accent);">
    <span style="font-size:13px;color:var(--label-2);">Ігнорувати кеш (примусово оновити з сайту)</span>
  </label>
  <label style="display:flex;align-items:center;gap:6px;margin-top:6px;cursor:pointer;">
    <input type="checkbox" id="includeSpecial" style="width:auto;accent-color:var(--accent);">
    <span style="font-size:13px;color:var(--label-2);">Показувати також поїзди з особливим графіком</span>
  </label>

  <div style="margin-top:14px;">
    <button type="button" class="btn-icon" style="width:100%;font-size:13px;display:flex;justify-content:space-between;align-items:center;" onclick="toggleVerifyBlock()">
      <span>Перевірити вручну</span>
      <span id="verifyToggleIcon">▾</span>
    </button>
    <div id="verifyBlock" style="display:none;margin-top:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:13px;color:var(--label);flex-shrink:0;width:70px;">Терешки</span>
        <a href="https://poizdato.net/rozklad-po-stantsii/tereshky/" target="_blank" class="btn-icon" style="font-size:12px;text-decoration:none;flex:1;text-align:center;">poizdato</a>
        <a href="https://swrailway.gov.ua/timetable/eltrain/?sid=2803" target="_blank" class="btn-icon" style="font-size:12px;text-decoration:none;flex:1;text-align:center;">swrailway</a>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
        <span style="font-size:13px;color:var(--label);flex-shrink:0;width:70px;">Копили</span>
        <a href="https://poizdato.net/rozklad-po-stantsii/kopyly/" target="_blank" class="btn-icon" style="font-size:12px;text-decoration:none;flex:1;text-align:center;">poizdato</a>
        <a href="https://swrailway.gov.ua/timetable/eltrain/?sid=2637" target="_blank" class="btn-icon" style="font-size:12px;text-decoration:none;flex:1;text-align:center;">swrailway</a>
      </div>
    </div>
  </div>
</div>

<button class="btn btn-primary" id="parseBtn" onclick="startParsing()">🔍 Завантажити розклад</button>
<button class="btn btn-retry" id="retryBtn" onclick="retryFailed()" style="display:none;">🔄 Дозавантажити</button>
<button class="btn" id="copyAllBtn" onclick="copyAll()" style="display:none;background:var(--green);color:#000;">📋 Копіювати всі 4 напрямки</button>
<button class="btn" id="saveFileBtn" onclick="saveAllToFile()" style="display:none;background:var(--warn);color:#000;">💾 Зберегти routes-data.js</button>

<div class="status" id="status"></div>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div id="output"></div>

<script src="pwa-install.js"></script>
<script>
PWAInstall.init({ appName: 'Парсер розкладу', swPath: '/sw.js', bannerBg: '#0a0a0f', themeColor: '#000000', themeColorLight: '#000000' });

/* ========== PRESETS ========== */
function toggleVerifyBlock() {
  const block = document.getElementById('verifyBlock');
  const icon = document.getElementById('verifyToggleIcon');
  const isHidden = block.style.display === 'none';
  block.style.display = isHidden ? 'block' : 'none';
  icon.textContent = isHidden ? '▴' : '▾';
}

const PRESETS = {
  tereschky: {
    station: 'tereshky',
    stations: ['Головач','Безручки','Клюшники','Зінці','Терешки','Полтава-Південна'],
    towardDir: { id:'ter_polt', from:'ТЕРЕШКИ', to:'ПОЛТАВА ПІВДЕННА', key:'Терешки', group:'g_ter_polt' },
    awayDir:   { id:'polt_ter', from:'ПОЛТАВА ПІВДЕННА', to:'ТЕРЕШКИ', key:'Терешки', group:'g_polt_ter' },
  },
  kopily: {
    station: 'kopyly',
    stations: ['Минівка','Портнівка','Кашубівка','Микільське','Копили','3 Км','Полтава-Південна'],
    towardDir: { id:'kop_polt', from:'КОПИЛИ', to:'ПОЛТАВА ПІВДЕННА', key:'Копили', group:'g_kop_polt' },
    awayDir:   { id:'polt_kop', from:'ПОЛТАВА ПІВДЕННА', to:'КОПИЛИ', key:'Копили', group:'g_polt_kop' },
  }
};

/* ========== INIT ========== */
function onSearchStationChange() {
  document.getElementById('tids').value = '';
  document.getElementById('tidsStatus').style.display = 'none';
}

function getMode() { return document.getElementById('searchStation').value; }

function getTids() {
  return document.getElementById('tids').value
    .split(/[\s,\n]+/).map(s => s.trim()).filter(Boolean);
}

/* ========== AUTO LOAD SLUGS ========== */
let _slugRouteMap = {}; // slug -> 'tereschky' | 'kopily'

async function autoLoadTids() {
  const mode = getMode();
  const statusEl = document.getElementById('tidsStatus');
  statusEl.style.display = 'block';
  statusEl.style.color = 'var(--accent)';

  const keys = mode === 'both' ? ['tereschky', 'kopily'] : [mode];
  const allSlugs = [];
  const allNums = [];
  _slugRouteMap = {};

  const refresh = document.getElementById('forceRefresh').checked;

  for (const key of keys) {
    statusEl.textContent = `⏳ Завантажую список поїздів (${key})...`;
    try {
      const url = `/api/fetch-station?station=${PRESETS[key].station}`
        + (refresh ? '&refresh=1' : '')
        + (document.getElementById('includeSpecial').checked ? '&includeSpecial=1' : '');
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (!data.trains?.length) throw new Error('Поїзди не знайдені');
      data.trains.forEach(t => {
        if (!allSlugs.includes(t.slug)) {
          allSlugs.push(t.slug);
          allNums.push(t.trainNum);
          _slugRouteMap[t.slug] = key;
        }
      });
    } catch(e) {
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = `❌ ${e.message}`;
      return;
    }
  }

  document.getElementById('tids').value = allSlugs.join(', ');
  statusEl.style.color = 'var(--green)';
  statusEl.textContent = `✅ Знайдено ${allSlugs.length} поїздів: ${allNums.join(', ')}`;
}

/* ========== FETCH ========== */
async function fetchTrain(slug, attempt = 0) {
  try {
    const refresh = document.getElementById('forceRefresh').checked;
    const url = `/api/fetch-timetable?slug=${encodeURIComponent(slug)}` + (refresh ? '&refresh=1' : '');
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) {
    if (attempt < 2) {
      await new Promise(r => setTimeout(r, 1000));
      return fetchTrain(slug, attempt + 1);
    }
    throw e;
  }
}

// Визначаємо маршрут поїзда за назвами станцій у його розкладі (fallback, якщо autoLoad не викликався)
function guessRoute(stations) {
  const names = stations.map(s => s.name);
  if (names.some(n => n.includes('Терешки'))) return 'tereschky';
  if (names.some(n => n.includes('Копили'))) return 'kopily';
  return null;
}

/* ========== STATE ========== */
let _state = { mode: null, results: [], failedSlugs: [] };

function setStatus(msg, type='info') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}
function setProgress(pct) {
  document.getElementById('progressBar').classList.toggle('show', pct > 0 && pct < 100);
  document.getElementById('progressFill').style.width = pct + '%';
}

async function startParsing() {
  const slugs = getTids();
  const mode = getMode();
  if (!slugs.length) { setStatus('Введіть поїзди (або натисніть "Завантажити автоматично")', 'error'); return; }
  _state = { mode, results: [], failedSlugs: [] };
  document.getElementById('output').innerHTML = '';
  document.getElementById('retryBtn').style.display = 'none';
  document.getElementById('copyAllBtn').style.display = 'none';
  document.getElementById('saveFileBtn').style.display = 'none';
  await runFetch(slugs);
}

async function retryFailed() {
  if (!_state.failedSlugs.length) return;
  const slugs = [..._state.failedSlugs];
  _state.failedSlugs = [];
  document.getElementById('retryBtn').style.display = 'none';
  await runFetch(slugs);
}

// Обмежений паралелізм
async function fetchWithLimit(items, concurrency, onEach) {
  const queue = [...items];
  const results = [];
  async function worker() {
    while (queue.length) {
      const item = queue.shift();
      results.push(await onEach(item));
    }
  }
  await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, worker));
  return results;
}

async function runFetch(slugs) {
  document.getElementById('parseBtn').disabled = true;
  setStatus(`Завантажую ${slugs.length} поїздів (макс. 4 паралельно)...`, 'info');
  setProgress(10);

  let done = 0;
  const allResults = await fetchWithLimit(slugs, 4, async slug => {
    try {
      const data = await fetchTrain(slug);
      const routeKey = _slugRouteMap[slug] || guessRoute(data.stations || []);
      if (!routeKey) throw new Error('Невідомий маршрут для цього поїзда');

      const preset = PRESETS[routeKey];
      const timesMap = {};
      (data.stations || []).forEach(s => { timesMap[s.name] = s; });

      const times = {};
      preset.stations.forEach(st => {
        const s = timesMap[st];
        times[st] = s ? (s.dep || s.arr || '-') : '-';
      });

      // Напрямок визначаємо по тому, чи є відправлення чи прибуття на Полтаві-Південній
      const poltava = timesMap['Полтава-Південна'];
      const direction = (poltava && poltava.arr && !poltava.dep) ? 'toward' : 'away';

      done++;
      setProgress(10 + Math.round(done / slugs.length * 85));
      setStatus(`Завантажую... ${done}/${slugs.length}`, 'info');
      return { slug, trainNum: data.trainNum, times, routeKey, direction };
    } catch(e) {
      console.warn(`slug=${slug}:`, e.message);
      done++;
      setProgress(10 + Math.round(done / slugs.length * 85));
      return { slug, failed: true };
    }
  });

  allResults.forEach(r => {
    if (!r) return;
    if (r.failed) {
      _state.failedSlugs.push(r.slug);
    } else {
      _state.results = _state.results.filter(x => x.slug !== r.slug);
      _state.results.push(r);
    }
  });

  setProgress(0);
  renderAll();

  const total = _state.results.length;
  const failed = _state.failedSlugs.length;
  if (!total) {
    setStatus('Нічого не вдалось завантажити', 'error');
  } else if (failed > 0) {
    setStatus(`✅ Завантажено ${total} поїздів. Не вдалось: ${failed}.`, 'ok');
    const btn = document.getElementById('retryBtn');
    btn.textContent = `🔄 Дозавантажити (${failed} поїздів)`;
    btn.style.display = 'block';
  } else {
    setStatus(`✅ Всі ${total} поїздів завантажено.`, 'ok');
  }
  document.getElementById('parseBtn').disabled = false;
}

/* ========== RENDER ========== */
function renderAll() {
  const { mode, results } = _state;
  document.getElementById('output').innerHTML = '';

  const sortByTime = arr => arr.sort((a,b) => {
    const ta = Object.values(a.times).find(t => t !== '-') || '99:99';
    const tb = Object.values(b.times).find(t => t !== '-') || '99:99';
    return ta.localeCompare(tb);
  });

  const out = document.getElementById('output');
  const keys = mode === 'both' ? ['tereschky', 'kopily'] : [mode];

  keys.forEach(key => {
    const preset = PRESETS[key];
    const stationsFwd = preset.stations;              // далекий кінець → Полтава
    const stationsRev = [...stationsFwd].reverse();   // Полтава → далекий кінець
    const routeResults = results.filter(r => r.routeKey === key);
    const toward = routeResults.filter(r => r.direction === 'toward'); // прямує до Полтави
    const away   = routeResults.filter(r => r.direction === 'away');  // від Полтави

    sortByTime(toward);
    sortByTime(away);

    if (toward.length) renderBlock(out, toward, stationsFwd, preset.towardDir);
    if (away.length)   renderBlock(out, away, stationsRev, preset.awayDir);
  });

  if (results.length) {
    document.getElementById('copyAllBtn').style.display = 'block';
    document.getElementById('saveFileBtn').style.display = 'block';
  }
}

function renderBlock(container, results, stations, dir) {
  const card = document.createElement('div');
  card.className = 'card result-block';
  const hdr = document.createElement('div');
  hdr.className = 'result-header';
  hdr.innerHTML = `
    <div class="result-title">${dir.from} — ${dir.to}</div>
    <button class="copy-btn">Копіювати JS</button>`;
  card.appendChild(hdr);

  const grid = document.createElement('div');
  grid.className = 'trains-grid';
  let html = '<table><tr><th class="s">Станція</th>';
  results.forEach(r => { html += `<th>🚂${r.trainNum||'?'}</th>`; });
  html += '</tr>';
  stations.forEach(st => {
    html += `<tr><td class="s">${st}</td>`;
    results.forEach(r => {
      const t = r.times[st] || '-';
      html += `<td class="${t==='-'?'miss':''}">${t}</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  grid.innerHTML = html;
  card.appendChild(grid);

  const jsBlock = document.createElement('pre');
  jsBlock.textContent = buildJS(results, stations, dir);
  jsBlock.style.display = 'none';
  card.appendChild(jsBlock);

  hdr.querySelector('.copy-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(jsBlock.textContent).then(() => {
      const btn = hdr.querySelector('.copy-btn');
      btn.textContent = '✓ Скопійовано';
      setTimeout(() => btn.textContent = 'Копіювати JS', 2000);
    });
  });
  container.appendChild(card);
}

function buildJS(results, stations, dir) {
  const rows = stations.map(st => {
    const times = results.map(r => `'${r.times[st]||'-'}'`).join(', ');
    const isKey = st.toLowerCase().includes(dir.key.toLowerCase());
    return `      { loc: '${st}', times: [${times}], key: ${isKey} },`;
  });
  return `  {\n    id: '${dir.id}',\n    from: '${dir.from}',\n    to: '${dir.to}',\n    keyStop: '${dir.key}',\n    group: '${dir.group}',\n    cols: ['Станція'${results.map((_,i)=>`, 'Рейс${i+1}'`).join('')}],\n    rows: [\n${rows.join('\n')}\n    ]\n  },`;
}

function copyAll() {
  const blocks = [...document.querySelectorAll('#output pre')];
  const js = 'const ROUTES = [\n' + blocks.map(b => b.textContent).join('\n') + '\n];';
  navigator.clipboard.writeText(js).then(() => {
    const btn = document.getElementById('copyAllBtn');
    btn.textContent = '✓ Скопійовано!';
    setTimeout(() => btn.textContent = '📋 Копіювати всі 4 напрямки', 2000);
  });
}

function pad2(n) { return String(n).padStart(2, '0'); }

function saveAllToFile() {
  const blocks = [...document.querySelectorAll('#output pre')];
  if (!blocks.length) return;
  const js = 'const ROUTES = [\n' + blocks.map(b => b.textContent).join('\n') + '\n];\n';

  const now = new Date();
  const stamp = `${pad2(now.getDate())}.${pad2(now.getMonth()+1)}.${now.getFullYear()}_${pad2(now.getHours())}.${pad2(now.getMinutes())}`;
  const filename = `routes-data_${stamp}.js`;

  const blob = new Blob([js], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);

  const btn = document.getElementById('saveFileBtn');
  btn.textContent = '✓ Збережено!';
  setTimeout(() => btn.textContent = '💾 Зберегти routes-data.js', 2000);
}
</script>
